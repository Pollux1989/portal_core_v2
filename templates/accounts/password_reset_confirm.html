{% extends "layouts/auth.html" %}

{% block auth_content %}

<h1>Password Reset Debug</h1>

<p>Valid link: {{ validlink }}</p>

<p>Form object:</p>
<pre>{{ form }}</pre>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update Password</button>
</form>

{% endblock %}
